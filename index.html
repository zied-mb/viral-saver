<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer-when-downgrade" />

  <title>ViralSaver | Download Social Media Videos, Reels, Stories & Photos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    (function() {
      // 1. اعتراض الأخطاء الناتجة عن ملفات الـ JS الخاصة بالإعلانات
      window.addEventListener('error', function(e) {
        const isAdDomain = e.filename && e.filename.includes('selfassured-celebration.com');
        const adScripts = ['ybNLQq', 'OGQE', 'wOMYQX', '1xNsDnUI4aOoQh'];
        const isAdInStack = e.error && e.error.stack && adScripts.some(s => e.error.stack.includes(s));

        if (isAdDomain || isAdInStack) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);

      // 2. حماية الـ postMessage من الـ DevTools Conflict
      const _orgPostMessage = window.postMessage;
      window.postMessage = function(data, ...args) {
        try {
          _orgPostMessage.apply(this, [data, ...args]);
        } catch (err) {
          const adScripts = ['ybNLQq', 'OGQE', 'wOMYQX', '1xNsDnUI4aOoQh'];
          const isAdScriptError = err.stack && adScripts.some(s => err.stack.includes(s));
          
          if (isAdScriptError) return; // تجاهل أخطاء الإعلانات فقط
          console.error(err); // إظهار بقية الأخطاء البرمجية عادي
        }
      };
    })();
  </script>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ViralSaver",
      "operatingSystem": "All",
      "applicationCategory": "MultimediaApplication",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1250"
      },
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Zied Meddeb"
      },
      "description": "Free tool to download social media videos, reels, stories and photos from Instagram, TikTok, and Facebook."
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
